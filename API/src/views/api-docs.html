<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GG Kasir — API Docs</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e2e8f0;
      --muted: #8892a4;
      --gold: #f5c842;
      --green: #4ade80;
      --red: #f87171;
      --blue: #60a5fa;
      --orange: #fb923c;
      --purple: #c084fc;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 20px; font-weight: 700; color: var(--gold); }
    header p { font-size: 12px; color: var(--muted); margin-top: 2px; }

    #server-status { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); animation: pulse 2s infinite; }
    .status-dot.online  { background: var(--green); }
    .status-dot.offline { background: var(--red); animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    #ngrok-url {
      font-size: 12px; color: var(--gold);
      background: rgba(245,200,66,.08);
      border: 1px solid rgba(245,200,66,.2);
      border-radius: 6px; padding: 4px 10px;
      text-decoration: none; transition: background .2s;
    }
    #ngrok-url:hover { background: rgba(245,200,66,.15); }

    main { max-width: 960px; margin: 0 auto; padding: 32px 24px; }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px; margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px; text-align: center;
    }
    .stat-card .num { font-size: 28px; font-weight: 700; color: var(--gold); }
    .stat-card .lbl { font-size: 11px; color: var(--muted); margin-top: 4px; }

    .endpoint-group {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden; margin-bottom: 12px;
    }
    .endpoint-group-header {
      padding: 14px 20px; background: rgba(255,255,255,.02);
      border-bottom: 1px solid var(--border);
      font-weight: 600; font-size: 13px;
      display: flex; align-items: center; gap: 10px;
    }
    .endpoint {
      display: grid; grid-template-columns: 72px 1fr auto 16px;
      align-items: center; gap: 12px; padding: 12px 20px;
      border-bottom: 1px solid var(--border); transition: background .15s;
    }
    .endpoint:last-child { border-bottom: none; }
    .endpoint:hover { background: rgba(255,255,255,.02); }

    .method {
      font-size: 11px; font-weight: 700; letter-spacing: .05em;
      padding: 3px 8px; border-radius: 5px; text-align: center;
    }
    .GET    { background: rgba(96,165,250,.15);  color: var(--blue); }
    .POST   { background: rgba(74,222,128,.15);  color: var(--green); }
    .PUT    { background: rgba(251,146,60,.15);  color: var(--orange); }
    .DELETE { background: rgba(248,113,113,.15); color: var(--red); }

    .path { font-family: 'Consolas', monospace; font-size: 13px; color: var(--text); }
    .desc { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .auth-badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; white-space: nowrap; }
    .auth-public     { background: rgba(74,222,128,.1);   color: var(--green);  border: 1px solid rgba(74,222,128,.2); }
    .auth-required   { background: rgba(192,132,252,.15); color: var(--purple); border: 1px solid rgba(192,132,252,.3); }
    .role-admin      { background: rgba(251,146,60,.1);   color: var(--orange); border: 1px solid rgba(251,146,60,.2); }
    .role-superadmin { background: rgba(248,113,113,.1);  color: var(--red);    border: 1px solid rgba(248,113,113,.2); }

    footer { text-align: center; padding: 32px; color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>GG Kasir API</h1>
    <p>REST API Documentation</p>
  </div>
  <div style="display:flex;align-items:center;gap:16px;">
    <div id="server-status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Checking...</span>
    </div>
    <a id="ngrok-url" href="#" target="_blank">Loading...</a>
    <form method="POST" action="/api/docs/logout" style="margin:0">
      <button type="submit" style="background:rgba(248,113,113,.15);color:#f87171;border:1px solid rgba(248,113,113,.3);border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer;">Logout</button>
    </form>
  </div>
</header>

<main>
  <div class="stats">
    <div class="stat-card"><div class="num" id="total-endpoints">—</div><div class="lbl">Endpoints</div></div>
    <div class="stat-card"><div class="num" id="total-groups">—</div><div class="lbl">Route Groups</div></div>
    <div class="stat-card"><div class="num" style="color:var(--green)" id="uptime">—</div><div class="lbl">Server Uptime</div></div>
    <div class="stat-card"><div class="num" style="color:var(--blue)" id="env-badge">—</div><div class="lbl">Environment</div></div>
  </div>
  <div id="docs-content"></div>
</main>

<footer>GG Store Cashier &mdash; Internal API &mdash; <span id="year"></span></footer>

<script src="/socket.io/socket.io.js"></script>
<script src="/api-docs.js"></script>
</body>
</html>
