<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GG Kasir — Docs Login</title>
  <style>
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
      --text: #e2e8f0; --muted: #8892a4; --gold: #f5c842;
      --green: #4ade80; --red: #f87171;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 380px;
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { font-size: 22px; font-weight: 700; color: var(--gold); }
    .logo p { font-size: 12px; color: var(--muted); margin-top: 4px; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    input[type="text"], input[type="password"] {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px; color: var(--text);
      font-size: 14px; outline: none; transition: border-color .2s;
    }
    input:focus { border-color: var(--gold); }
    .field { margin-bottom: 16px; }
    .remember {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--muted); margin-bottom: 20px; cursor: pointer;
    }
    .remember input { width: auto; accent-color: var(--gold); }
    button {
      width: 100%; background: var(--gold); color: #0f1117;
      border: none; border-radius: 8px; padding: 11px;
      font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity .2s;
    }
    button:hover { opacity: .85; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    #error-msg {
      display: none; background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.3);
      color: var(--red); border-radius: 8px; padding: 10px 14px;
      font-size: 13px; margin-bottom: 16px; text-align: center;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>GG Kasir API</h1>
    <p>Superadmin access required</p>
  </div>
  <div id="error-msg"></div>
  <form id="login-form">
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required />
    </div>
    <label class="remember">
      <input type="checkbox" id="remember" name="remember" />
      Remember me for 1 day
    </label>
    <button type="submit" id="submit-btn">Sign In</button>
  </form>
</div>
<script src="/docs-login.js"></script>
</body>
</html>
